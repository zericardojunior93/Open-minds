<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Minds | Post</title>
    <link rel="icon" href="img/logo.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .full-post-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 10rem 20px 5rem;
        }
        .full-post-img {
            width: 100%;
            height: 450px;
            background-color: #111;
            border-radius: 8px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #444;
            text-transform: uppercase;
        }
        .full-post-header {
            margin-bottom: 2rem;
        }
        .full-post-title {
            font-size: 2.5rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 1.5rem;
            color: var(--texto);
        }
        .full-post-content {
            font-size: 1.15rem;
            line-height: 1.8;
            color: var(--texto-secundario);
            text-align: justify;
        }
        .full-post-content p {
            margin-bottom: 1.5rem;
        }
        .back-link {
            color: var(--ciano);
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 2rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <div class="container header-container">
            <a href="index.html" class="logo-container">
                <img src="img/logo.png" alt="Open Minds Logo"> <span>Open Minds</span>
            </a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="carreiras.html">Carreiras</a></li>
                    <li><a href="cursos.html">Cursos</a></li>
                    <li><a href="blog.html">Blog</a></li>
                    <li><a href="minhas_assinaturas.html">Minhas assinaturas</a></li>
                </ul>
            </nav>
            <button class="login-btn">
                <span class="texto-ciano">Entrar</span>
            </button>
        </div>
    </header>

    <main class="full-post-container">
        <a href="blog.html" class="back-link">← Voltar para o Blog</a>
        <div id="post-target">
            <!-- Conteúdo será injetado aqui -->
            <p style="color: #444;">Carregando postagem...</p>
        </div>
    </main>

    <footer>
        <div class="container footer-container">
            <div class="footer-top">
                <a href="index.html" class="logo-container">
                    <img src="img/logo.png" alt="Open Minds Logo Ciano">
                    <p>Open Minds Educacional LTDA | CNPJ: 12.345.678/0001-90</p>
                </a>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Open Minds Educação Tecnológica. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts de Lógica -->
    <script src="auth.js"></script>
    <script src="header-auth.js"></script>
    <script src="blog-data.js"></script>

    <!-- Carregando React e Babel Standalone via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- CÓDIGO REACT POST (Escrito em JSX!) -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function SinglePost() {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');
            const [post, setPost] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                if (!postId || !window.blogData) {
                    setError("ID da postagem está ausente ou inválido.");
                    return;
                }

                const foundPost = window.blogData.find(p => p.id === postId);
                if (foundPost) {
                    setPost(foundPost);
                    document.title = `Open Minds | ${foundPost.titulo}`;
                } else {
                    setError("Sentimos muito, mas esta postagem não existe mais ou foi movida.");
                }
            }, [postId]);

            if (error) {
                return (
                    <div className="error-container">
                        <h1>Post não encontrado</h1>
                        <p>{error}</p>
                    </div>
                );
            }

            if (!post) {
                return <p style={{ color: '#444' }}>Carregando postagem...</p>;
            }

            return (
                <div id="post-content">
                    <div className="full-post-header">
                        <div className="author-info" style={{ marginBottom: '1.5rem' }}>
                            <div className="author-avatar">
                                {post.id <= 5 ? <img src="img/Imagens blog/Nerd.png" alt="Avatar" /> : "OM"}
                            </div>
                            <div className="author-details">
                                <p className="author-name">{post.autor}</p>
                                <p className="post-meta">{post.data} · {post.leitura}</p>
                            </div>
                        </div>
                        <h1 className="full-post-title">{post.titulo}</h1>
                    </div>
                    
                    {post.temImagem && (
                        <div className="full-post-img" style={{ padding: 0, overflow: 'hidden' }}>
                           {post.bannerImagem ? (
                               <img src={post.bannerImagem} alt={post.titulo} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                           ) : (
                               <span>Espaço para Imagem</span>
                           )}
                        </div>
                    )}

                    <div className="full-post-content" dangerouslySetInnerHTML={{ __html: post.conteudo }}>
                    </div>

                    <div className="post-share-footer" style={{ borderTop: '1px solid #333', marginTop: '4rem', paddingTop: '2rem', display: 'flex', gap: '2rem', alignItems: 'center' }}>
                        <span style={{ color: '#888', fontSize: '1.1rem', fontWeight: '600', marginRight: '15px' }}>Compartilhar:</span>
                        <div style={{ display: 'flex', gap: '1.5rem', alignItems: 'center' }}>
                            <a href="#" style={{ display: 'flex', alignItems: 'center' }}>
                                <img src="img/redes sociais logos/facebook-removebg-preview.png" alt="Facebook" style={{ width: '35px', height: '35px', opacity: 0.8, transition: '0.3s' }} onMouseOver={e => e.target.style.opacity = 1} onMouseOut={e => e.target.style.opacity = 0.8} />
                            </a>
                            <a href="#" style={{ display: 'flex', alignItems: 'center' }}>
                                <img src="img/redes sociais logos/twitter-removebg-preview.png" alt="Twitter" style={{ width: '35px', height: '35px', opacity: 0.8, transition: '0.3s' }} onMouseOver={e => e.target.style.opacity = 1} onMouseOut={e => e.target.style.opacity = 0.8} />
                            </a>
                            <a href="#" style={{ display: 'flex', alignItems: 'center' }}>
                                <img src="img/redes sociais logos/instagram-removebg-preview.png" alt="Instagram" style={{ width: '35px', height: '35px', opacity: 0.8, transition: '0.3s' }} onMouseOver={e => e.target.style.opacity = 1} onMouseOut={e => e.target.style.opacity = 0.8} />
                            </a>
                            <a href="#" style={{ display: 'flex', alignItems: 'center' }}>
                                <img src="img/redes sociais logos/whatsapp-removebg-preview.png" alt="WhatsApp" style={{ width: '35px', height: '35px', opacity: 0.8, transition: '0.3s' }} onMouseOver={e => e.target.style.opacity = 1} onMouseOut={e => e.target.style.opacity = 0.8} />
                            </a>
                        </div>
                    </div>
                </div>
            );
        }

        // Renderiza o App no Root
        const root = ReactDOM.createRoot(document.getElementById('post-target'));
        root.render(<SinglePost />);
    </script>
</body>
</html>
